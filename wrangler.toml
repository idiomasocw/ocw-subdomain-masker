name = "ocw-subdomain-masker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Environment variables
# Set ROUTE_MAP here (for dev) or in the Cloudflare dashboard (for production).
# Value is a JSON string mapping subdomain keys to target URLs.
# If absent, the worker falls back to DEFAULT_ROUTE_MAP in src/constants.ts.
#
# Example:
# [vars]
# ROUTE_MAP = '{"reward1":"https://view.genially.com/670ed038d21493d4843b3e5b","reward2":"https://..."}'

# Custom Domains — bind the Worker to ONLY the specific reward* subdomains.
#
# Each entry with `custom_domain = true` makes Cloudflare:
#   1. auto-create a proxied DNS record for that exact hostname, and
#   2. route it straight to this Worker (no traditional origin → no 522).
#
# This deliberately does NOT use a wildcard, so every other subdomain on
# onecultureworld.com (your other apps) is left completely untouched.
#
# To add a new reward link: add one line below and push to main.
routes = [
  { pattern = "reward1.onecultureworld.com", custom_domain = true },
  # { pattern = "reward2.onecultureworld.com", custom_domain = true },
  # { pattern = "reward3.onecultureworld.com", custom_domain = true },
]
