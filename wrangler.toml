name = "ocw-subdomain-masker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Environment variables
# Set ROUTE_MAP here (for dev) or in the Cloudflare dashboard (for production).
# Value is a JSON string mapping subdomain keys to target URLs.
# If absent, the worker falls back to DEFAULT_ROUTE_MAP in src/constants.ts.
#
# Example:
# [vars]
# ROUTE_MAP = '{"reward1":"https://view.genially.com/670ed038d21493d4843b3e5b","reward2":"https://..."}'

# Routes — intercept all subdomain traffic on onecultureworld.com.
# Uncomment after creating the GitHub → Cloudflare Workers link and giving
# the API token Zone:Edit permissions for onecultureworld.com.
#
# [[routes]]
# pattern = "*.onecultureworld.com/*"
# zone_name = "onecultureworld.com"
