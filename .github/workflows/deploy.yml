name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Deployment is handled by Cloudflare's native GitHub integration.
# This workflow only runs tests to gate merges.

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # reads pnpm version from "packageManager" field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
